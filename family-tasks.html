<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Tasks</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #0b0b14;
            --surface:  #13131f;
            --surface2: #1a1a2e;
            --border:   rgba(255,255,255,0.07);
            --text:     #e8e8f8;
            --muted:    #5a5a7a;
            --stu:      #5b7fff;
            --louise:   #ff4da6;
            --saf:      #b06fff;
            --anya:     #00d4f5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── LOGIN ── */
        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 28px 20px;
            background: radial-gradient(ellipse at 50% 0%, rgba(91,127,255,0.12) 0%, transparent 60%);
        }

        .login-logo {
            font-size: 3.2rem;
            margin-bottom: 4px;
            filter: drop-shadow(0 0 20px rgba(91,127,255,0.5));
        }

        .login-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #aab4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .login-sub { color: var(--muted); margin-bottom: 40px; font-size: 0.95rem; }

        .user-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            width: 100%;
            max-width: 360px;
        }

        .user-card {
            background: var(--surface);
            border-radius: 22px;
            padding: 28px 10px 20px;
            text-align: center;
            cursor: pointer;
            border: 1.5px solid var(--border);
            transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .user-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.2s;
            border-radius: 22px;
        }

        .user-card:hover { transform: translateY(-4px); }
        .user-card:active { transform: scale(0.96); }

        .card-stu:hover   { border-color: var(--stu);    box-shadow: 0 8px 32px rgba(91,127,255,0.25); }
        .card-louise:hover{ border-color: var(--louise); box-shadow: 0 8px 32px rgba(255,77,166,0.25); }
        .card-saf:hover   { border-color: var(--saf);    box-shadow: 0 8px 32px rgba(176,111,255,0.25); }
        .card-anya:hover  { border-color: var(--anya);   box-shadow: 0 8px 32px rgba(0,212,245,0.25); }

        .avatar-ring {
            width: 64px; height: 64px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px;
            font-size: 2rem;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .card-stu   .avatar-ring { background: linear-gradient(135deg, rgba(91,127,255,0.3), rgba(91,127,255,0.1)); border-color: rgba(91,127,255,0.4); }
        .card-louise .avatar-ring{ background: linear-gradient(135deg, rgba(255,77,166,0.3), rgba(255,77,166,0.1)); border-color: rgba(255,77,166,0.4); }
        .card-saf   .avatar-ring { background: linear-gradient(135deg, rgba(176,111,255,0.3), rgba(176,111,255,0.1)); border-color: rgba(176,111,255,0.4); }
        .card-anya  .avatar-ring { background: linear-gradient(135deg, rgba(0,212,245,0.3), rgba(0,212,245,0.1)); border-color: rgba(0,212,245,0.4); }

        .user-name { font-weight: 700; font-size: 1.1rem; }
        .user-role { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

        .card-stu   .user-name { color: var(--stu); }
        .card-louise .user-name{ color: var(--louise); }
        .card-saf   .user-name { color: var(--saf); }
        .card-anya  .user-name { color: var(--anya); }

        /* ── PIN MODAL ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
        }

        .modal {
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 24px;
            padding: 36px 28px;
            width: 90%; max-width: 340px;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }

        .modal h2 { font-size: 1.3rem; font-weight: 800; }
        .modal p  { color: var(--muted); font-size: 0.9rem; margin-top: 8px; }

        .pin-row { display: flex; gap: 10px; justify-content: center; margin: 24px 0 8px; }

        .pin-digit {
            width: 52px; height: 62px;
            text-align: center; font-size: 1.6rem; font-weight: 700;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px; outline: none;
            color: var(--text);
            transition: border-color 0.15s;
        }

        .pin-digit:focus { border-color: var(--stu); box-shadow: 0 0 0 3px rgba(91,127,255,0.2); }
        .pin-error { color: #ff5576; font-size: 0.85rem; min-height: 18px; }
        .cancel-link { background: none; border: none; color: var(--muted); cursor: pointer; margin-top: 16px; font-size: 0.9rem; }
        .cancel-link:hover { color: var(--text); }

        /* ── HEADER ── */
        .app-header {
            background: rgba(11,11,20,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 14px 18px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-avatar { display:inline-flex; width:32px; height:32px; align-items:center; vertical-align:middle; }
        .header-name { font-weight: 700; font-size: 1.05rem; }
        .week-badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px; padding: 4px 12px;
            font-size: 0.75rem; font-weight: 600; color: var(--muted);
        }

        .switch-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
            cursor: pointer; font-size: 0.82rem;
            padding: 6px 12px; border-radius: 10px;
            transition: all 0.15s;
        }
        .switch-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

        /* ── CONTENT ── */
        .content { padding: 18px 16px; max-width: 560px; margin: 0 auto; }

        /* ── PROGRESS CARD ── */
        .progress-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px 20px; margin-bottom: 18px;
        }

        .progress-top {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }

        .progress-label { font-weight: 600; font-size: 0.95rem; color: var(--muted); }
        .progress-count { font-weight: 800; font-size: 1.15rem; }
        .progress-bar { height: 8px; background: var(--surface2); border-radius: 10px; overflow: hidden; }

        .progress-fill {
            height: 100%; border-radius: 10px;
            transition: width 0.6s cubic-bezier(.4,0,.2,1);
        }

        /* ── TASK ITEMS ── */
        .task-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 18px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 15px;
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .task-item:active { transform: scale(0.98); }

        .task-item.done {
            opacity: 0.4;
        }

        .check-circle {
            width: 28px; height: 28px; border-radius: 50%;
            border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; flex-shrink: 0;
            transition: all 0.25s cubic-bezier(.4,0,.2,1);
            background: var(--surface2);
        }

        .task-item.done .check-circle {
            background: #22c55e;
            border-color: #22c55e;
            color: white;
            box-shadow: 0 0 12px rgba(34,197,94,0.4);
        }

        .task-text { font-size: 1rem; font-weight: 500; }
        .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

        /* ── EMPTY STATES ── */
        .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
        .empty-state .emoji { font-size: 2.8rem; margin-bottom: 12px; display: block; }

        .all-done-state { text-align: center; padding: 40px 20px; }
        .all-done-state .big-emoji { font-size: 4rem; display: block; margin-bottom: 16px; }
        .all-done-state h2 { font-size: 1.5rem; font-weight: 800; color: #22c55e; margin-bottom: 8px; }
        .all-done-state p { color: var(--muted); font-size: 0.95rem; }

        /* ── ADMIN VIEW ── */
        .section-label {
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; margin-top: 24px;
        }

        .kid-summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 18px; margin-bottom: 10px;
        }

        .kid-summary-top {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
        }

        .kid-summary-left { display: flex; align-items: center; gap: 10px; }
        .kid-chip {
            font-size: 0.72rem; font-weight: 700;
            padding: 2px 9px; border-radius: 20px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
        }

        .kid-count { font-size: 0.85rem; color: var(--muted); font-weight: 600; }

        .tab-bar { display: flex; gap: 8px; margin-bottom: 16px; }

        .tab-btn {
            padding: 9px 20px; border-radius: 12px; border: 1.5px solid var(--border);
            cursor: pointer; font-weight: 700; font-size: 0.88rem;
            background: var(--surface); color: var(--muted);
            transition: all 0.18s;
        }

        .tab-btn.active {
            background: var(--stu); color: white; border-color: var(--stu);
            box-shadow: 0 4px 16px rgba(91,127,255,0.35);
        }

        .list-context {
            background: rgba(91,127,255,0.08);
            border: 1px solid rgba(91,127,255,0.2);
            border-radius: 12px;
            padding: 10px 14px; margin-bottom: 16px;
            font-size: 0.88rem; color: #8898ff;
        }

        .add-row { display: flex; gap: 8px; margin-bottom: 14px; }

        .add-input {
            flex: 1; padding: 12px 15px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem; outline: none;
            color: var(--text);
            transition: border-color 0.15s;
        }

        .add-input::placeholder { color: var(--muted); }
        .add-input:focus { border-color: var(--stu); box-shadow: 0 0 0 3px rgba(91,127,255,0.15); }

        .add-btn {
            padding: 12px 18px;
            background: var(--stu); color: white;
            border: none; border-radius: 12px;
            cursor: pointer; font-weight: 700; font-size: 0.95rem;
            transition: all 0.15s; white-space: nowrap;
            box-shadow: 0 4px 14px rgba(91,127,255,0.3);
        }

        .add-btn:hover { background: #4a6eff; transform: translateY(-1px); }

        .admin-task-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 13px 16px; margin-bottom: 8px;
            display: flex; align-items: center; gap: 12px;
        }

        .drag-handle { color: var(--muted); font-size: 0.9rem; cursor: grab; }
        .admin-task-text { flex: 1; font-size: 0.95rem; }

        .del-btn {
            background: none; border: none; color: #ff5576;
            cursor: pointer; font-size: 1rem; padding: 4px 6px;
            border-radius: 8px; opacity: 0.35; transition: opacity 0.15s;
        }

        .del-btn:hover { opacity: 1; }

        /* ── ACTIVITY FEED ── */
        .activity-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px; margin-bottom: 8px;
            display: flex; align-items: center; gap: 12px;
        }

        .activity-icon { display:inline-flex; width:28px; height:28px; align-items:center; vertical-align:middle; }
        .activity-text { flex: 1; font-size: 0.88rem; color: var(--muted); }
        .activity-text strong { color: var(--text); font-weight: 600; }
        .activity-time { font-size: 0.75rem; color: var(--muted); }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 11px 22px; border-radius: 14px;
            font-size: 0.9rem; font-weight: 500;
            z-index: 200; opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none; white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        #toast.show { opacity: 1; }

        /* ── STAR BURST ── */
        .star-piece {
            position: fixed; top: 50%; left: 50%;
            pointer-events: none; z-index: 300;
            font-size: 1.2rem;
            animation: starBurst 0.8s ease-out forwards;
        }

        @keyframes starBurst {
            from { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            to   { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; }
        }

        /* ── CONFETTI ── */
        .confetti-piece {
            position: fixed; top: -10px;
            border-radius: 3px;
            animation: confettiFall linear forwards;
            pointer-events: none; z-index: 300;
        }

        @keyframes confettiFall {
            to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 400px) {
            .login-title { font-size: 1.7rem; }
            .user-card { padding: 22px 8px 16px; }
            .avatar-ring { width: 54px; height: 54px; font-size: 1.7rem; }
        }
    </style>
</head>
<body>

<div id="toast"></div>

<!-- ══ LOGIN ══ -->
<div id="loginScreen">
    <div class="login-logo">🏡</div>
    <h1 class="login-title">Family Tasks</h1>
    <p class="login-sub">Who's checking in?</p>

    <div class="user-grid">
        <div class="user-card card-stu" onclick="selectUser('stu')">
            <div class="avatar-ring"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%"><ellipse cx="32" cy="35" rx="17" ry="19" fill="#f5c89a"/><path d="M16 31 Q14.5 22 22 18" stroke="#2c1a0e" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M48 31 Q49.5 22 42 18" stroke="#2c1a0e" stroke-width="5" fill="none" stroke-linecap="round"/><ellipse cx="15" cy="36" rx="3" ry="4" fill="#e0a870"/><ellipse cx="49" cy="36" rx="3" ry="4" fill="#e0a870"/><rect x="17" y="28" width="12" height="9" rx="3" fill="none" stroke="#444" stroke-width="2"/><rect x="35" y="28" width="12" height="9" rx="3" fill="none" stroke="#444" stroke-width="2"/><line x1="29" y1="32.5" x2="35" y2="32.5" stroke="#444" stroke-width="2"/><line x1="17" y1="32.5" x2="12" y2="33" stroke="#444" stroke-width="1.8"/><line x1="47" y1="32.5" x2="52" y2="33" stroke="#444" stroke-width="1.8"/><circle cx="23" cy="32.5" r="2.2" fill="#2d1a0f"/><circle cx="41" cy="32.5" r="2.2" fill="#2d1a0f"/><circle cx="22.2" cy="31.5" r="0.7" fill="white" opacity="0.7"/><circle cx="40.2" cy="31.5" r="0.7" fill="white" opacity="0.7"/><path d="M30 39 Q32 41 34 39" stroke="#c89060" stroke-width="1.2" fill="none"/><path d="M26 45 Q32 50 38 45" stroke="#b07050" stroke-width="2" fill="none" stroke-linecap="round"/></svg></div>
            <div class="user-name">Stu</div>
            <div class="user-role">Admin</div>
        </div>
        <div class="user-card card-louise" onclick="selectUser('louise')">
            <div class="avatar-ring"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%"><ellipse cx="32" cy="31" rx="20" ry="23" fill="#1a0e08"/><ellipse cx="32" cy="35" rx="17" ry="19" fill="#f5c89a"/><ellipse cx="14" cy="36" rx="3" ry="4" fill="#e0a870"/><ellipse cx="50" cy="36" rx="3" ry="4" fill="#e0a870"/><circle cx="25" cy="32" r="2.5" fill="#2d1a0f"/><circle cx="39" cy="32" r="2.5" fill="#2d1a0f"/><circle cx="24" cy="31" r="0.8" fill="white" opacity="0.7"/><circle cx="38" cy="31" r="0.8" fill="white" opacity="0.7"/><path d="M30 37.5 Q32 39.5 34 37.5" stroke="#c89060" stroke-width="1.2" fill="none"/><path d="M25 43 Q32 48 39 43" stroke="#b07050" stroke-width="2" fill="none" stroke-linecap="round"/></svg></div>
            <div class="user-name">Louise</div>
            <div class="user-role">Admin</div>
        </div>
        <div class="user-card card-saf" onclick="selectUser('saf')">
            <div class="avatar-ring"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%"><circle cx="11" cy="40" r="8" fill="#a87030"/><circle cx="53" cy="40" r="8" fill="#a87030"/><ellipse cx="32" cy="31" rx="20" ry="23" fill="#a87030"/><ellipse cx="32" cy="35" rx="17" ry="19" fill="#f5c89a"/><ellipse cx="14" cy="36" rx="3" ry="4" fill="#e0a870"/><ellipse cx="50" cy="36" rx="3" ry="4" fill="#e0a870"/><circle cx="25" cy="32" r="2.5" fill="#2d1a0f"/><circle cx="39" cy="32" r="2.5" fill="#2d1a0f"/><circle cx="24" cy="31" r="0.8" fill="white" opacity="0.7"/><circle cx="38" cy="31" r="0.8" fill="white" opacity="0.7"/><path d="M30 37.5 Q32 39.5 34 37.5" stroke="#c89060" stroke-width="1.2" fill="none"/><path d="M25 43 Q32 48 39 43" stroke="#b07050" stroke-width="2" fill="none" stroke-linecap="round"/></svg></div>
            <div class="user-name">Saf</div>
            <div class="user-role">Tasks this week</div>
        </div>
        <div class="user-card card-anya" onclick="selectUser('anya')">
            <div class="avatar-ring"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%"><ellipse cx="32" cy="30" rx="20" ry="24" fill="#c8a84a"/><ellipse cx="32" cy="35" rx="17" ry="19" fill="#f5c89a"/><ellipse cx="14" cy="36" rx="3" ry="4" fill="#e0a870"/><ellipse cx="50" cy="36" rx="3" ry="4" fill="#e0a870"/><circle cx="25" cy="32" r="2.5" fill="#2d1a0f"/><circle cx="39" cy="32" r="2.5" fill="#2d1a0f"/><circle cx="24" cy="31" r="0.8" fill="white" opacity="0.7"/><circle cx="38" cy="31" r="0.8" fill="white" opacity="0.7"/><path d="M30 37.5 Q32 39.5 34 37.5" stroke="#c89060" stroke-width="1.2" fill="none"/><path d="M25 43 Q32 48 39 43" stroke="#b07050" stroke-width="2" fill="none" stroke-linecap="round"/></svg></div>
            <div class="user-name">Anya</div>
            <div class="user-role">Tasks this week</div>
        </div>
    </div>
</div>

<!-- ══ PIN MODAL ══ -->
<div class="modal-overlay" id="pinModal" style="display:none;">
    <div class="modal">
        <h2>🔒 Adults Only</h2>
        <p>Enter your 4-digit PIN</p>
        <div class="pin-row">
            <input class="pin-digit" id="p1" maxlength="1" type="password" inputmode="numeric" oninput="pinNext(1)">
            <input class="pin-digit" id="p2" maxlength="1" type="password" inputmode="numeric" oninput="pinNext(2)">
            <input class="pin-digit" id="p3" maxlength="1" type="password" inputmode="numeric" oninput="pinNext(3)">
            <input class="pin-digit" id="p4" maxlength="1" type="password" inputmode="numeric" oninput="pinNext(4)">
        </div>
        <div class="pin-error" id="pinError"></div>
        <br>
        <button class="cancel-link" onclick="cancelPin()">Cancel</button>
    </div>
</div>

<!-- ══ KID VIEW ══ -->
<div id="kidView" style="display:none;">
    <div class="app-header">
        <div class="header-left">
            <span class="header-avatar" id="kidAvatar"></span>
            <span class="header-name" id="kidName"></span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
            <span class="week-badge" id="kidWeekBadge"></span>
            <button class="switch-btn" onclick="logout()">⇄ Switch</button>
        </div>
    </div>
    <div class="content">
        <div class="progress-card">
            <div class="progress-top">
                <span class="progress-label">This week</span>
                <span class="progress-count" id="kidProgressCount">0 / 0</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="kidProgressFill" style="width:0%"></div>
            </div>
        </div>
        <div id="kidTaskList"></div>
    </div>
</div>

<!-- ══ ADULT VIEW ══ -->
<div id="adultView" style="display:none;">
    <div class="app-header">
        <div class="header-left">
            <span class="header-avatar" id="adultAvatar"></span>
            <span class="header-name" id="adultName"></span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
            <span class="week-badge" id="adultWeekBadge"></span>

    </div>
    <div class="content">
        <div class="section-label">This Week's Progress</div>
        <div id="kidsProgress"></div>

        <div class="section-label" id="activityLabel" style="display:none;">Recent Activity</div>
        <div id="activityFeed"></div>

        <div class="section-label">Manage Task Lists</div>
        <div class="tab-bar">
            <button class="tab-btn active" id="tabA" onclick="switchTab('A')">📋 List A</button>
            <button class="tab-btn"        id="tabB" onclick="switchTab('B')">📋 List B</button>
        </div>
        <div class="list-context" id="listContext"></div>
        <div class="add-row">

            <button class="add-btn" onclick="addTask()">+ Add</button>
        </div>
        <div id="adminTaskList"></div>
    </div>
</div>

// ── Users ────────────────────────────────────────────────
const AVATARS = {
    stu:    `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%"><ellipse cx="32" cy="35" rx="17" ry="19" fill="#f5c89a"/><path d="M16 31 Q14.5 22 22 18" stroke="#2c1a0e" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M48 31 Q49.5 22 42 18" stroke="#2c1a0e" stroke-width="5" fill="none" stroke-linecap="round"/><ellipse cx="15" cy="36" rx="3" ry="4" fill="#e0a870"/><ellipse cx="49" cy="36" rx="3" ry="4" fill="#e0a870"/><rect x="17" y="28" width="12" height="9" rx="3" fill="none" stroke="#444" stroke-width="2"/><rect x="35" y="28" width="12" height="9" rx="3" fill="none" stroke="#444" stroke-width="2"/><line x1="29" y1="32.5" x2="35" y2="32.5" stroke="#444" stroke-width="2"/><line x1="17" y1="32.5" x2="12" y2="33" stroke="#444" stroke-width="1.8"/><line x1="47" y1="32.5" x2="52" y2="33" stroke="#444" stroke-width="1.8"/><circle cx="23" cy="32.5" r="2.2" fill="#2d1a0f"/><circle cx="41" cy="32.5" r="2.2" fill="#2d1a0f"/><circle cx="22.2" cy="31.5" r="0.7" fill="white" opacity="0.7"/><circle cx="40.2" cy="31.5" r="0.7" fill="white" opacity="0.7"/><path d="M30 39 Q32 41 34 39" stroke="#c89060" stroke-width="1.2" fill="none"/><path d="M26 45 Q32 50 38 45" stroke="#b07050" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`,
    louise: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%"><ellipse cx="32" cy="31" rx="20" ry="23" fill="#1a0e08"/><ellipse cx="32" cy="35" rx="17" ry="19" fill="#f5c89a"/><ellipse cx="14" cy="36" rx="3" ry="4" fill="#e0a870"/><ellipse cx="50" cy="36" rx="3" ry="4" fill="#e0a870"/><circle cx="25" cy="32" r="2.5" fill="#2d1a0f"/><circle cx="39" cy="32" r="2.5" fill="#2d1a0f"/><circle cx="24" cy="31" r="0.8" fill="white" opacity="0.7"/><circle cx="38" cy="31" r="0.8" fill="white" opacity="0.7"/><path d="M30 37.5 Q32 39.5 34 37.5" stroke="#c89060" stroke-width="1.2" fill="none"/><path d="M25 43 Q32 48 39 43" stroke="#b07050" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`,
    saf:    `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%"><circle cx="11" cy="40" r="8" fill="#a87030"/><circle cx="53" cy="40" r="8" fill="#a87030"/><ellipse cx="32" cy="31" rx="20" ry="23" fill="#a87030"/><ellipse cx="32" cy="35" rx="17" ry="19" fill="#f5c89a"/><ellipse cx="14" cy="36" rx="3" ry="4" fill="#e0a870"/><ellipse cx="50" cy="36" rx="3" ry="4" fill="#e0a870"/><circle cx="25" cy="32" r="2.5" fill="#2d1a0f"/><circle cx="39" cy="32" r="2.5" fill="#2d1a0f"/><circle cx="24" cy="31" r="0.8" fill="white" opacity="0.7"/><circle cx="38" cy="31" r="0.8" fill="white" opacity="0.7"/><path d="M30 37.5 Q32 39.5 34 37.5" stroke="#c89060" stroke-width="1.2" fill="none"/><path d="M25 43 Q32 48 39 43" stroke="#b07050" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`,
    anya:   `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%"><ellipse cx="32" cy="30" rx="20" ry="24" fill="#c8a84a"/><ellipse cx="32" cy="35" rx="17" ry="19" fill="#f5c89a"/><ellipse cx="14" cy="36" rx="3" ry="4" fill="#e0a870"/><ellipse cx="50" cy="36" rx="3" ry="4" fill="#e0a870"/><circle cx="25" cy="32" r="2.5" fill="#2d1a0f"/><circle cx="39" cy="32" r="2.5" fill="#2d1a0f"/><circle cx="24" cy="31" r="0.8" fill="white" opacity="0.7"/><circle cx="38" cy="31" r="0.8" fill="white" opacity="0.7"/><path d="M30 37.5 Q32 39.5 34 37.5" stroke="#c89060" stroke-width="1.2" fill="none"/><path d="M25 43 Q32 48 39 43" stroke="#b07050" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`,
};
const USERS = {
    stu:    { name: 'Stu',    avatar: AVATARS.stu,    color: '#5b7fff', adult: true  },
    louise: { name: 'Louise', avatar: AVATARS.louise, color: '#ff4da6', adult: true  },
    saf:    { name: 'Saf',    avatar: AVATARS.saf,    color: '#b06fff', adult: false },
    anya:   { name: 'Anya',   avatar: AVATARS.anya,   color: '#00d4f5', adult: false },
};

// ── State ────────────────────────────────────────────────
let currentUser = null;
let currentTab  = 'A';
let listeners   = [];

// ── Week helpers ─────────────────────────────────────────
function isoWeek(d = new Date()) {
    const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const day  = date.getUTCDay() || 7;
    date.setUTCDate(date.getUTCDate() + 4 - day);
    const jan1 = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
    return { week: Math.ceil(((date - jan1) / 86400000 + 1) / 7), year: date.getUTCFullYear() };
}

function weekKey() {
    const { week, year } = isoWeek();
    return `${year}-W${String(week).padStart(2, '0')}`;
}

function weekLabel() {
    const now = new Date();
    const day = now.getDay() || 7;
    const mon = new Date(now); mon.setDate(now.getDate() - day + 1);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    const fmt = d => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    return `${fmt(mon)} – ${fmt(sun)}`;
}

function kidList(kid) {
    const { week } = isoWeek();
    const odd = week % 2 === 1;
    if (kid === 'saf')  return odd ? 'A' : 'B';
    if (kid === 'anya') return odd ? 'B' : 'A';
    return 'A';
}

// ── Login / PIN ──────────────────────────────────────────
let pendingUser = null;

window.selectUser = function(uid) {
    if (USERS[uid].adult) { pendingUser = uid; openPinModal(); }
    else loginAs(uid);
};

function openPinModal() {
    ['p1','p2','p3','p4'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('pinError').textContent = '';
    document.getElementById('pinModal').style.display = 'flex';
    document.getElementById('p1').focus();
}

window.pinNext = function(n) {
    const val = document.getElementById(`p${n}`).value;
    if (val && n < 4) document.getElementById(`p${n+1}`).focus();
    if (n === 4 && val) checkPin();
};

function checkPin() {
    const pin = [1,2,3,4].map(i => document.getElementById(`p${i}`).value).join('');
    if (pin === ADULT_PIN) {
        document.getElementById('pinModal').style.display = 'none';
        loginAs(pendingUser);
    } else {
        document.getElementById('pinError').textContent = 'Incorrect PIN — try again';
        setTimeout(() => {
            ['p1','p2','p3','p4'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('p1').focus();
        }, 600);
    }
}

window.cancelPin = function() {
    document.getElementById('pinModal').style.display = 'none';
    pendingUser = null;
};

function loginAs(uid) {
    currentUser = uid;
    sessionStorage.setItem('ftUser', uid);
    document.getElementById('loginScreen').style.display = 'none';
    if (USERS[uid].adult) showAdultView();
    else showKidView();
}

window.logout = function() {
    listeners.forEach(fn => fn());
    listeners = [];
    if (window._adminUnsub) { window._adminUnsub(); window._adminUnsub = null; }
    currentUser = null;
    sessionStorage.removeItem('ftUser');
    ['kidView','adultView'].forEach(id => document.getElementById(id).style.display = 'none');
    document.getElementById('loginScreen').style.display = 'flex';
};

// ── Kid View ────────────────────────────────────────────
function showKidView() {
    const u    = USERS[currentUser];
    const list = kidList(currentUser);
    const wk   = weekKey();

    document.getElementById('kidAvatar').innerHTML      = u.avatar;
    document.getElementById('kidName').textContent      = u.name;
    document.getElementById('kidWeekBadge').textContent = weekLabel();
    document.getElementById('kidView').style.display    = 'block';

    // Set progress colour
    document.getElementById('kidProgressCount').style.color = u.color;
    document.getElementById('kidProgressFill').style.background =
        `linear-gradient(90deg, ${u.color}, ${u.color}bb)`;

    let tasks = {}, done = {};

    const render = () => {
        const ids   = Object.keys(tasks);
        const doneN = ids.filter(id => done[id]).length;
        const total = ids.length;
        const pct   = total ? Math.round((doneN / total) * 100) : 0;

        document.getElementById('kidProgressCount').textContent = `${doneN} / ${total}`;
        const fill = document.getElementById('kidProgressFill');
        fill.style.width = pct + '%';
        if (pct === 100 && total > 0) {
            fill.style.background = 'linear-gradient(90deg, #22c55e, #16a34a)';
        }

        const el = document.getElementById('kidTaskList');

        if (!total) {
            el.innerHTML = `<div class="empty-state"><span class="emoji">📋</span><p>No tasks set yet — check back soon!</p></div>`;
            return;
        }

        if (doneN === total) {
            el.innerHTML = `<div class="all-done-state">
                <span class="big-emoji">🎉</span>
                <h2>All done!</h2>
                <p>Amazing work this week, ${u.name}!</p>
            </div>`;
            return;
        }

        const sorted = ids.sort((a, b) => {
            const da = !!done[a], db = !!done[b];
            if (da !== db) return da ? 1 : -1;
            return (tasks[a]._order || 0) - (tasks[b]._order || 0);
        });

        el.innerHTML = sorted.map(id => `
            <div class="task-item ${done[id] ? 'done' : ''}" onclick="toggleTask('${id}')">
                <div class="check-circle">${done[id] ? '✓' : ''}</div>
                <span class="task-text">${esc(tasks[id].title)}</span>
            </div>
        `).join('');
    };

    const tRef = query(collection(db, 'tasks', `list${list}`, 'items'), orderBy('createdAt'));
    const dRef = collection(db, 'completions', wk, currentUser);

    const u1 = onSnapshot(tRef, snap => {
        tasks = {};
        snap.forEach(d => { tasks[d.id] = { ...d.data(), _order: d.data().createdAt?.seconds || 0 }; });
        render();
    });
    const u2 = onSnapshot(dRef, snap => {
        done = {};
        snap.forEach(d => { done[d.id] = true; });
        render();
    });
    listeners.push(u1, u2);

    window.toggleTask = async function(taskId) {
        const wk2  = weekKey();
        const ref  = doc(db, 'completions', wk2, currentUser, taskId);
        const snap = await getDoc(ref);
        if (snap.exists()) {
            await deleteDoc(ref);
        } else {
            const task = tasks[taskId];
            await setDoc(ref, {
                completedAt: serverTimestamp(),
                taskTitle:   task?.title || '',
                taskList:    list,
                kid:         currentUser,
                kidName:     u.name
            });
            const actRef = doc(collection(db, 'activity'));
            await setDoc(actRef, {
                type:      'completion',
                kid:       currentUser,
                kidName:   u.name,
                taskTitle: task?.title || '',
                taskList:  list,
                weekKey:   wk2,
                at:        serverTimestamp()
            });
            launchConfetti(u.color);
            if (NOTIFY_ENABLED) sendEmailNotification(u.name, task?.title || '');
        }
    };
}

// ── Adult View ───────────────────────────────────────────
function showAdultView() {
    const u = USERS[currentUser];
    document.getElementById('adultAvatar').innerHTML      = u.avatar;
    document.getElementById('adultName').textContent      = u.name;
    document.getElementById('adultWeekBadge').textContent = weekLabel();
    document.getElementById('adultView').style.display    = 'block';
    updateListContext();
    loadKidsProgress();
    loadActivityFeed();
    loadAdminTasks();
}

function updateListContext() {
    document.getElementById('listContext').innerHTML =
        `<b>This week:</b> Saf → List ${kidList('saf')} &nbsp;·&nbsp; Anya → List ${kidList('anya')}`;
}

function loadKidsProgress() {
    const wk = weekKey();
    const el = document.getElementById('kidsProgress');
    el.innerHTML = '';

    ['saf', 'anya'].forEach(kid => {
        const u    = USERS[kid];
        const list = kidList(kid);
        const cid  = `ks-${kid}`;

        el.insertAdjacentHTML('beforeend', `
            <div class="kid-summary-card" id="${cid}">
                <div class="kid-summary-top">
                    <div class="kid-summary-left">
                        <span style="display:inline-flex;width:30px;height:30px;align-items:center;vertical-align:middle">${u.avatar}</span>
                        <strong>${u.name}</strong>
                        <span class="kid-chip">List ${list}</span>
                    </div>
                    <span class="kid-count" id="${cid}-count">—</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="${cid}-bar" style="width:0%;background:${u.color}"></div>
                </div>
            </div>`);

        let tc = 0, dc = 0;
        const update = () => {
            const pct  = tc ? Math.round((dc / tc) * 100) : 0;
            const fill = document.getElementById(`${cid}-bar`);
            const cnt  = document.getElementById(`${cid}-count`);
            if (fill) fill.style.width = pct + '%';
            if (fill && pct === 100) fill.style.background = 'linear-gradient(90deg,#22c55e,#16a34a)';
            if (cnt)  cnt.textContent  = `${dc} / ${tc} done`;
        };

        const u1 = onSnapshot(collection(db, 'tasks', `list${list}`, 'items'), s => { tc = s.size; update(); });
        const u2 = onSnapshot(collection(db, 'completions', wk, kid), s => { dc = s.size; update(); });
        listeners.push(u1, u2);
    });
}

function loadActivityFeed() {
    const wk  = weekKey();
    const lbl = document.getElementById('activityLabel');
    const fd  = document.getElementById('activityFeed');

    const aRef = query(
        collection(db, 'activity'),
        where('weekKey', '==', wk),
        orderBy('at', 'desc'),
        limit(20)
    );

    const unsub = onSnapshot(aRef, snap => {
        const items = [];
        snap.forEach(d => items.push(d.data()));
        if (!items.length) { lbl.style.display = 'none'; fd.innerHTML = ''; return; }
        lbl.style.display = 'block';
        fd.innerHTML = items.map(item => `
            <div class="activity-item">
                <span class="activity-icon">${USERS[item.kid]?.avatar ?? item.kidAvatar ?? ''}</span>
                <div class="activity-text">
                    <strong>${esc(item.kidName)}</strong> completed <strong>${esc(item.taskTitle)}</strong>
                </div>
                <span class="activity-time">${item.at?.toDate ? timeAgo(item.at.toDate()) : ''}</span>
            </div>`).join('');
    });
    listeners.push(unsub);
}

function loadAdminTasks() {
    if (window._adminUnsub) { window._adminUnsub(); window._adminUnsub = null; }
    const tRef = query(collection(db, 'tasks', `list${currentTab}`, 'items'), orderBy('createdAt'));
    window._adminUnsub = onSnapshot(tRef, snap => {
        const tasks = [];
        snap.forEach(d => tasks.push({ id: d.id, ...d.data() }));
        renderAdminTasks(tasks);
    });
}

function renderAdminTasks(tasks) {
    const el = document.getElementById('adminTaskList');
    if (!tasks.length) {
        el.innerHTML = `<div class="empty-state" style="padding:32px 0;"><span class="emoji">📝</span><p>No tasks in List ${currentTab} yet</p></div>`;
        return;
    }
    el.innerHTML = tasks.map(t => `
        <div class="admin-task-item">
            <span class="drag-handle">⠿</span>
            <span class="admin-task-text">${esc(t.title)}</span>
            <button class="del-btn" onclick="deleteTask('${t.id}')">🗑</button>
        </div>`).join('');
}

window.switchTab = function(list) {
    currentTab = list;
    document.getElementById('tabA').className = `tab-btn${list==='A' ? ' active' : ''}`;
    document.getElementById('tabB').className = `tab-btn${list==='B' ? ' active' : ''}`;
    loadAdminTasks();
};

window.addTask = async function() {
    const input = document.getElementById('newTask');
    const title = input.value.trim();
    if (!title) return;
    await setDoc(doc(collection(db, 'tasks', `list${currentTab}`, 'items')), {
        title, createdAt: serverTimestamp(), createdBy: currentUser
    });
    input.value = '';
    toast(`Added to List ${currentTab} ✓`);
};

window.deleteTask = async function(taskId) {
    if (!confirm('Remove this task?')) return;
    await deleteDoc(doc(db, 'tasks', `list${currentTab}`, 'items', taskId));
    toast('Task removed');
};

// ── Notifications ────────────────────────────────────────
async function sendEmailNotification(kidName, taskTitle) {
    if (!NOTIFY_ENABLED) return;
    try {
        await fetch('https://api.emailjs.com/api/v1.0/email/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                service_id: EMAILJS_SERVICE, template_id: EMAILJS_TEMPLATE,
                user_id: EMAILJS_PUBLIC,
                template_params: { kid_name: kidName, task_title: taskTitle, week_label: weekLabel(), to_email: NOTIFY_ADDRESSES.join(',') }
            })
        });
    } catch(e) { console.warn('Notification failed:', e); }
}

// ── Confetti ─────────────────────────────────────────────
function launchConfetti(userColor) {
    const colors = [userColor, '#22c55e', '#f59e0b', '#ff4da6', '#00d4f5', '#b06fff'];
    for (let i = 0; i < 32; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.cssText = `
            left:${Math.random()*100}vw;
            width:${6+Math.random()*8}px;
            height:${6+Math.random()*8}px;
            background:${colors[Math.floor(Math.random()*colors.length)]};
            animation-duration:${1.2+Math.random()*1.5}s;
            animation-delay:${Math.random()*0.3}s;
            border-radius:${Math.random()>0.5?'50%':'3px'};
        `;
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
    }
}

// ── Utilities ────────────────────────────────────────────
function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
}

function timeAgo(date) {
    const diff = Math.floor((Date.now() - date.getTime()) / 1000);
    if (diff < 60)    return 'just now';
    if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return `${Math.floor(diff/86400)}d ago`;
}

// ── Auto-login ───────────────────────────────────────────
const saved = sessionStorage.getItem('ftUser');
if (saved && USERS[saved]) loginAs(saved);
</script>
